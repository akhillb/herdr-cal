id = "attention"
name = "Attention"
version = "0.2.0"
min_herdr_version = "0.7.0"
description = "A unified attention feed for herdr: merges meetings (and more, via addons) into NOW / SOON / WATCHING tiers with live countdowns and triage actions."
platforms = ["macos", "linux"]

[[panes]]
id = "feed"
title = "ATTENTION"
placement = "split"
command = ["node", "src/board.js"]

[[actions]]
id = "open"
title = "Open Attention"
contexts = ["global"]
command = ["sh", "-c", "\"$HERDR_BIN_PATH\" plugin pane open --plugin \"$HERDR_PLUGIN_ID\" --entrypoint feed"]

[[actions]]
id = "setup"
title = "Attention setup help"
contexts = ["global"]
command = ["node", "src/setup.js"]

[[events]]
on = "workspace.created"
command = ["node", "src/on-workspace.js"]
